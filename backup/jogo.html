<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDP Online - Pro Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    .active-turn {
    box-shadow: 0 0 20px var(--gold) !important;
    border: 2px solid var(--gold) !important;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1.1) translateX(-50%); }
    50% { transform: scale(1.15) translateX(-50%); }
    100% { transform: scale(1.1) translateX(-50%); }
}
    :root {
        --bg-gradient: radial-gradient(circle, #1a472a 0%, #05140a 100%);
        --gold: #ffd700;
        --card-back: repeating-linear-gradient(45deg, #1a2a6c, #1a2a6c 10px, #b21f1f 10px, #b21f1f 20px);
    }
    body { font-family: 'Segoe UI', sans-serif; background: #050f09; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
    .toast { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; opacity: 0.9; }
    #multiplayer-overlay, #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #winner-overlay { display: none; }
    .conn-box { background: #111; padding: 30px; border: 2px solid var(--gold); border-radius: 15px; max-width: 400px; }
    input { padding: 10px; border-radius: 5px; border: none; width: 80%; margin: 10px 0; text-align: center; }
    #sidebar { width: 240px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--gold); display: flex; flex-direction: column; z-index: 100; }
    #scoreboard { padding: 15px; border-bottom: 1px solid #333; }
    #game-log { height: 200px; background: #111; border-top: 2px solid var(--gold); padding: 10px; font-size: 11px; overflow-y: auto; color: #ddd; flex-shrink: 0; }
    #chat-box { flex-grow: 1; padding: 10px; font-size: 13px; overflow-y: auto; background: #000; color: #aaa; }
    #main-game { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    #status-bar { width: 100%; background: rgba(0,0,0,0.8); padding: 15px; text-align: center; font-size: 18px; color: var(--gold); font-weight: bold; min-height: 25px; }
    #game-board { position: relative; width: 90%; max-width: 900px; height: 65vh; margin: 20px; border: 12px solid #3d2b1f; border-radius: 180px; background: var(--bg-gradient); }
    .player-slot { position: absolute; width: 180px; text-align: center; padding: 10px; border-radius: 15px; transition: all 0.3s ease; background: rgba(0,0,0,0.4); }
    .active-turn { background: rgba(255, 215, 0, 0.2); transform: scale(1.1) translateX(-50%) !important; z-index: 10; }
    #p1 { bottom: 10px; left: 50%; transform: translateX(-50%); }
    #p2 { right: 10px; top: 50%; transform: translateY(-50%); }
    #p3 { top: 10px; left: 50%; transform: translateX(-50%); }
    #p4 { left: 10px; top: 50%; transform: translateY(-50%); }
    .info-box { font-size: 12px; margin-bottom: 5px; }
    .bet-done { color: #00ff00; font-weight: bold; margin-left: 5px; }
    .hand { display: flex; justify-content: center; height: 90px; perspective: 1000px; }
    .card { width: 60px; height: 85px; background: white; border-radius: 6px; color: #222; position: relative; cursor: pointer; transition: transform 0.2s; flex-shrink: 0; border: 1px solid #999; }
    .hand .card:not(:first-child) { margin-left: -35px; }
    .hand .card:hover { transform: translateY(-15px); z-index: 100 !important; }
    .card.red { color: #cc0000; }
    .card.hidden-back { background: var(--card-back); border: 2px solid white; }
    .card .rank { position: absolute; top: 2px; left: 5px; font-size: 16px; font-weight: bold; }
    .card .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; }
    .card .suit-mini { position: absolute; bottom: 2px; right: 5px; font-size: 14px; }
    #table-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; }
    .card-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; transition: all 0.5s; }
    .card-owner-name { font-size: 10px; color: var(--gold); margin-top: 5px; font-weight: bold; }
    .played-card { animation: throwCard 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
    @keyframes throwCard { 0% { transform: scale(0.2); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    #controls { padding: 10px; z-index: 100; }
    button { padding: 12px 25px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 5px; }
    button:disabled { background: #555; cursor: not-allowed; }
    .bet-btn { margin: 3px; font-size: 16px; }
    /* --- Aprimoramento Visual das Cartas (Adicionado) --- */
    .card {
        box-shadow: 2px 2px 5px rgba(0,0,0,0.4) !important;
        border-radius: 8px !important;
        border: 1px solid #aaa !important;
        transition: transform 0.2s, box-shadow 0.2s !important;
    }

    .card:hover {
        box-shadow: 0 8px 16px rgba(0,0,0,0.6) !important;
    }

    .card.hidden-back {
        background: var(--card-back) !important;
        background-image: radial-gradient(circle, #2c3e50 0%, #000 100%) !important;
        border: 2px solid white !important;
        box-shadow: inset 0 0 0 3px #1a2a6c !important;
    }

    .card .center {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<body>

<div id="toast-container"></div>
<div id="multiplayer-overlay">
    <div class="conn-box">
        <h2 style="color:var(--gold)">FDP ONLINE</h2>
        <div id="setup-view">
            <p>Seu ID: <b id="my-id">...</b></p>
            <input type="text" id="peer-id-input" placeholder="Cole o ID do seu amigo">
            <br>
            <button onclick="connectToPeer()">Conectar ao Amigo</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0">
            <button onclick="startSolo()" style="background:#555">Jogar com Bots (Solo)</button>
            <p id="conn-status" style="font-size:12px; color:#aaa"></p>
        </div>
        <div id="lobby-view" style="display:none">
            <h3>Jogadores na Sala:</h3>
            <ul id="player-list" style="list-style:none; padding:0"></ul>
            <button id="host-start-btn" onclick="startGame()" style="display:none">Começar Partida</button>
        </div>
    </div>
</div>

<div id="winner-overlay">
    <h1 style="color:var(--gold); font-size: 4rem;">🏆 VENCEDOR 🏆</h1>
    <h2 id="winner-name" style="color: white;"></h2>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<div id="sidebar">
    <div id="audio-control" style="padding: 10px; text-align: center;">
    <button id="toggle-music" onclick="toggleMusic()">🔊 Som Ligado</button>
</div>
    <div id="scoreboard">
        <h3 style="margin:0; color:var(--gold)">🏆 Placar</h3>
        <div id="score-list" style="margin-top:10px"></div>
    </div>
    <div id="game-log"></div>
    <div id="chat-box"></div>
</div>

<div id="main-game">
    <div id="status-bar">Aguardando início...</div>
    <div id="game-board">
        <div id="p1" class="player-slot"><div class="info-box" id="i1"></div><div class="hand" id="h1"></div></div>
        <div id="p2" class="player-slot"><div class="info-box" id="i2"></div><div class="hand" id="h2"></div></div>
        <div id="p3" class="player-slot"><div class="info-box" id="i3"></div><div class="hand" id="h3"></div></div>
        <div id="p4" class="player-slot"><div class="info-box" id="i4"></div><div class="hand" id="h4"></div></div>
        <div id="table-area"></div>
    </div>
    <div id="controls">
        <div id="bet-zone"></div>
    </div>
</div>

<script>
    window.onbeforeunload = function() {
    return "Você tem certeza que quer sair? A partida será encerrada.";
};
    function logEvent(msg, type = 'info') {
    const log = document.getElementById('game-log');
    const entry = document.createElement('div');
    if (type === 'win') entry.style.color = '#ffd700'; // Ouro para vitórias
    entry.innerText = `> ${msg}`;
    log.prepend(entry);
}
// Exemplo de uso no código: 
// logEvent(`🏆 ${players[winIdx].name} venceu a mesa!`, 'win');
    function toggleMusic() {
    const music = document.getElementById('bg-music');
    const btn = document.getElementById('toggle-music');
    if (music.paused) {
        music.play();
        btn.innerText = "🔊 Som Ligado";
    } else {
        music.pause();
        btn.innerText = "🔇 Som Desligado";
    }
}
    const music = document.getElementById('bg-music');

// Tenta tocar apenas após o primeiro clique do usuário em qualquer lugar
document.addEventListener('click', () => {
    if (music.paused) {
        music.volume = 0.1;
        music.play().then(() => {
            console.log("Música iniciada!");
        }).catch(error => {
            console.log("Erro ao tocar música:", error);
        });
    }
}, { once: true });
    const playerName = prompt("Como você quer ser chamado?", "Jogador");

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function logEvent(msg) {
        const log = document.getElementById('game-log');
        const entry = document.createElement('div');
        entry.innerText = `> ${msg}`;
        log.prepend(entry);
    }

    function renderTable() {
        const area = document.getElementById('table-area');
        area.innerHTML = '';
        const positions = [
            {top: '60%', left: '50%'},
            {top: '50%', left: '40%'},
            {top: '40%', left: '50%'},
            {top: '50%', left: '60%'}
        ];
        tableCards.forEach((item, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.style.top = positions[index].top;
            wrapper.style.left = positions[index].left;
            const el = document.createElement('div');
            const isRed = (item.card.s === '♥' || item.card.s === '♦');
            el.className = `card played-card ${isRed ? 'red' : ''}`;
            el.innerHTML = `<div class="rank">${item.card.v}</div><div class="center">${item.card.s}</div><div class="suit-mini">${item.card.s}</div>`;
            const nameLabel = document.createElement('div');
            nameLabel.className = 'card-owner-name';
            nameLabel.innerText = players[item.owner].name;
            wrapper.appendChild(el);
            wrapper.appendChild(nameLabel);
            area.appendChild(wrapper);
        });
    }

    let peer, conn;
    let isHost = false;
    let myPlayerIndex = 0;
    let connections = []; 

    const au = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, d) {
        const o = au.createOscillator(); const g = au.createGain();
        o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, au.currentTime + d);
        o.connect(g); g.connect(au.destination); o.start(); o.stop(au.currentTime + d);
    }

    const suits = ['♣', '♥', '♠', '♦'];
    const values = ['4', '5', '6', '7', 'Q', 'J', 'K', 'A', '2', '3'];
    const power = {'4♣':100,'7♥':99,'A♠':98,'7♦':97,'3':10,'2':9,'A':8,'K':7,'J':6,'Q':5,'7':4,'6':3,'5':2,'4':1};

    let players = [
        { id: 0, name: playerName || "Você", lives: 3, hand: [], bid: 0, won: 0, bot: false, hasBetted: false, remote: false },
        { id: 1, name: "Bot 1", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false },
        { id: 2, name: "Bot 2", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false },
        { id: 3, name: "Bot 3", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false }
    ];

    let currentCards = 1;
    let turnStarter = 0;
    let roundStarter = 0;
    let tableCards = [];

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => { document.getElementById('my-id').innerText = id; });
        peer.on('connection', c => { isHost = true; setupConn(c); document.getElementById('setup-view').style.display = 'none'; document.getElementById('lobby-view').style.display = 'block'; document.getElementById('host-start-btn').style.display = 'inline-block'; });
    }

    function connectToPeer() {
        const remoteId = document.getElementById('peer-id-input').value;
        if(!remoteId) return alert("Insira um ID!");
        conn = peer.connect(remoteId);
        setupConn(conn);
        document.getElementById('conn-status').innerText = "Conectando...";
    }

    function setupConn(c) {
        c.on('open', () => {
            if(!isHost) {
                conn = c;
                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('lobby-view').style.display = 'block';
                document.getElementById('conn-status').innerText = "Conectado ao Host!";
            } else {
                connections.push(c);
                let nextSlot = players.find(p => p.bot);
                if(nextSlot) { nextSlot.bot = false; nextSlot.remote = true; nextSlot.name = "Amigo " + nextSlot.id; nextSlot.connId = c.peer; }
                updateLobbyList();
                broadcast({ type: 'LOBBY_UPDATE', players: players });
            }
        });
        c.on('data', data => handleNetworkData(data));
    }

    function updateLobbyList() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `<li>${p.name} ${p.bot ? '(Bot)' : p.id === 0 && isHost ? '(Host)' : '(Player)'}</li>`).join('');
    }

    function startSolo() {
        isHost = true;
        document.getElementById('multiplayer-overlay').style.display = 'none';
        startGame();
    }

    initPeer();

    function broadcast(data) { connections.forEach(c => c.send(data)); }

    function sendTo(playerIdx, data) {
        const p = players[playerIdx];
        const target = connections.find(c => c.peer === p.connId);
        if(target) target.send(data);
    }

    function handleNetworkData(data) {
        if(data.type === 'LOBBY_UPDATE') { players = data.players; myPlayerIndex = players.findIndex(p => p.connId === peer.id); updateLobbyList(); }
        if(data.type === 'START_GAME') { document.getElementById('multiplayer-overlay').style.display = 'none'; }
        if(data.type === 'SYNC_STATE') { players = data.players; tableCards = data.tableCards; currentCards = data.currentCards; updateStatus(data.status); render(); renderTable(); if(data.activeId !== undefined) highlightPlayer(data.activeId); if(data.winner) showWinner(data.winner); }
        if(data.type === 'ASK_BID') { askBid(data.forbidden).then(val => { conn.send({ type: 'RES_BID', value: val, from: myPlayerIndex }); }); }
        if(data.type === 'ASK_CARD') { waitCard().then(card => { conn.send({ type: 'RES_CARD', value: card, from: myPlayerIndex }); }); }
        if(isHost) {
            if(data.type === 'RES_BID' && window.resolverBid) { window.resolverBid(data.value); window.resolverBid = null; }
            if(data.type === 'RES_CARD' && window.resolverCard) { window.resolverCard(data.value); window.resolverCard = null; }
        }
    }

    function showWinner(name) {
        document.getElementById('winner-name').innerText = name;
        document.getElementById('winner-overlay').style.display = 'flex';
    }

    function updateStatus(m) { document.getElementById('status-bar').innerText = m; }

    function highlightPlayer(id) {
        document.querySelectorAll('.player-slot').forEach(s => s.classList.remove('active-turn'));
        if(id !== null) { document.getElementById(`p${id+1}`).classList.add('active-turn'); }
    }

    async function startGame() {
        if(isHost) broadcast({ type: 'START_GAME' });
        document.getElementById('multiplayer-overlay').style.display = 'none';
        if(!isHost && conn) return;
        roundStarter = Math.floor(Math.random() * 4);
        gameLoop();
    }

    async function gameLoop() {
        if (currentCards > 10) return updateStatus("FIM DO JOGO!");
        players.forEach(p => { p.hand = []; p.bid = 0; p.won = 0; p.hasBetted = false; });
        tableCards = [];
        let deck = [];
        for(let s of suits) for(let v of values) deck.push({s, v, id: v+s});
        deck.sort(() => Math.random() - 0.5);
        for(let i=0; i<currentCards; i++) { players.forEach(p => { if(p.lives > 0) p.hand.push(deck.pop()); }); }
        
        sync(); 
        
        turnStarter = roundStarter;
        await handleBids();
        await handleTricks();
        
        let alive = players.filter(p => p.lives > 0);
        if (alive.length === 1) {
            sync("FIM!", null, alive[0].name);
            showWinner(alive[0].name);
            return;
        }

        roundStarter = (roundStarter + 1) % 4;
        currentCards++;
        gameLoop();
    }

    function sync(msg = "", active = null, winner = null) {
        if(!isHost) return;
        render();
        renderTable();
        broadcast({ type: 'SYNC_STATE', players: players, tableCards: tableCards, currentCards: currentCards, status: msg, activeId: active, winner: winner });
    }

    async function handleBids() {
        let bidder = roundStarter;
        let sum = 0;
        let activePlayers = players.filter(p => p.lives > 0);
        
        for (let i = 0; i < activePlayers.length; i++) {
            let p = players[bidder];
            let forbidden = (i === activePlayers.length - 1 && currentCards > 1) ? (currentCards - sum) : -1;
            
            highlightPlayer(bidder);
            if (p.bot) {
                updateStatus(`${p.name} pensando...`);
                await new Promise(r => setTimeout(r, 600));
                let strength = p.hand.filter(c => (power[c.id] || power[c.v]) > 7).length;
                p.bid = Math.min(currentCards, strength);
                if (p.bid === forbidden) p.bid = p.bid === 0 ? 1 : p.bid - 1;
            } else if (p.remote) {
                updateStatus(`Aguardando palpite de ${p.name}...`);
                sendTo(bidder, { type: 'ASK_BID', forbidden });
                p.bid = await new Promise(res => { window.resolverBid = res; });
            } else {
                updateStatus("Sua vez! Qual seu palpite?");
                p.bid = await askBid(forbidden);
            }
            sum += p.bid;
            p.hasBetted = true;
            sfx(400, 'sine', 0.1);
            logEvent(`${p.name} deu o palpite: ${p.bid}`);
            sync();
            bidder = (bidder + 1) % 4;
        }
    }

    function askBid(forbidden) {
        return new Promise(res => {
            const zone = document.getElementById('bet-zone');
            zone.innerHTML = '';
            for(let i=0; i<=currentCards; i++) {
                let b = document.createElement('button');
                b.className = 'bet-btn';
                b.innerText = i;
                if(i === forbidden) b.disabled = true;
                b.onclick = () => { zone.innerHTML=''; res(i); };
                zone.appendChild(b);
            }
        });
    }

    async function handleTricks() {
        for(let t=0; t<currentCards; t++) {
            tableCards = [];
            let pIdx = turnStarter;
            for(let i=0; i<4; i++) {
                let p = players[pIdx];
                if(p.lives > 0) {
                    highlightPlayer(pIdx);
                    let card;
                    if(p.bot) {
                        updateStatus(`${p.name} jogando...`);
                        await new Promise(r => setTimeout(r, 800));
                        p.hand.sort((a,b) => (power[a.id]||power[b.id]) - (power[a.id]||power[b.id]));
                        card = p.won < p.bid ? p.hand.pop() : p.hand.shift();
                    } else if (p.remote) {
                        updateStatus(`Aguardando carta de ${p.name}...`);
                        sendTo(pIdx, { type: 'ASK_CARD' });
                        card = await new Promise(res => { window.resolverCard = res; });
                        if(!card) p.hand.shift();
                    } else {
                        updateStatus("Sua vez! Escolha uma carta.");
                        card = await waitCard();
                    }
                    tableCards.push({card, owner: pIdx});
                    sfx(600, 'sine', 0.1);
                    logEvent(`${p.name} jogou ${card.v}${card.s}`);
                    sync(null, pIdx);
                }
                pIdx = (pIdx + 1) % 4;
            }
            let winIdx = calcWinner(tableCards);
            players[winIdx].won++;
            turnStarter = winIdx;
            logEvent(`🏆 ${players[winIdx].name} venceu a mesa!`);
            showToast(`${players[winIdx].name} venceu a mesa!`);
            sfx(800, 'triangle', 0.2);
            await new Promise(r => setTimeout(r, 1500));
            tableCards = []; 
            sync();
        }
        await endRound();
    }

    function waitCard() {
        return new Promise(res => {
            const cards = document.querySelectorAll(`#h${myPlayerIndex+1} .card`);
            cards.forEach((c, i) => {
                c.onclick = () => {
                    cards.forEach(el => el.onclick = null);
                    let card = players[myPlayerIndex].hand.splice(i,1)[0];
                    res(card);
                };
            });
        });
    }

    function calcWinner(list) {
        let sc = list.map(x => ({...x, pwr: power[x.card.id] || power[x.card.v]}));
        let counts = {}; sc.forEach(s => counts[s.pwr] = (counts[s.pwr] || 0) + 1);
        let valid = sc.filter(s => counts[s.pwr] === 1);
        if (valid.length === 0) {
            let max = Math.max(...sc.map(s => s.pwr));
            let ties = sc.filter(s => s.pwr === max);
            const suitsP = {'♣':4,'♥':3,'♠':2,'♦':1};
            return ties.sort((a,b) => suitsP[b.card.s] - suitsP[a.card.s])[0].owner;
        }
        return valid.sort((a,b) => b.pwr - a.pwr)[0].owner;
    }

    async function endRound() {
        players.forEach(p => { if(p.lives > 0 && p.bid !== p.won) p.lives--; });
        logEvent("--- Fim da rodada! ---");
        sync();
        await new Promise(r => setTimeout(r, 2000));
    }

    function render() {
        players.forEach((p, i) => {
            const info = document.getElementById(`i${i+1}`);
            info.innerHTML = `<b>${p.name}</b> ${p.hasBetted ? '<span class="bet-done">✅</span>' : ''}<br>
                              <span style="color:#ff5555">❤️ ${p.lives}</span> | Palpite: ${p.bid} | Fez: ${p.won}`;
            const h = document.getElementById(`h${i+1}`);
            h.innerHTML = '';
            if (p.lives <= 0) { info.innerHTML = "ELIMINADO"; return; }
            
            p.hand.forEach((c, idx) => {
                const el = document.createElement('div');
                const isRed = (c.s === '♥' || c.s === '♦');
                
                // Lógica de visibilidade corrigida:
                // Rodada 1: Esconde as minhas (i == myPlayerIndex)
                // Rodadas > 1: Esconde as dos outros (i !== myPlayerIndex)
                let hide;
                if (currentCards === 1) {
                    hide = (i === myPlayerIndex);
                } else {
                    hide = (i !== myPlayerIndex);
                }
                
                el.className = `card ${isRed ? 'red' : ''} ${hide ? 'hidden-back' : ''}`;
                if(!hide) {
                    el.innerHTML = `<div class="rank">${c.v}</div><div class="center">${c.s}</div><div class="suit-mini">${c.s}</div>`;
                }
                h.appendChild(el);
            });
        });
        const sl = document.getElementById('score-list');
        let sorted = [...players].sort((a,b) => b.lives - a.lives);
        sl.innerHTML = sorted.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.name}</span> <b>${p.lives}❤️</b></div>`).join('');
    }
</script>
</body>
</html>
