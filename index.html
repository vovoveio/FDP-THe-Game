<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDP Online - Pro Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle, #1a472a 0%, #05140a 100%);
            --gold: #ffd700;
            --card-back: repeating-linear-gradient(45deg, #1a2a6c, #1a2a6c 10px, #b21f1f 10px, #b21f1f 20px);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050f09;
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- UI de Conexão --- */
        #multiplayer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .conn-box {
            background: #111;
            padding: 30px;
            border: 2px solid var(--gold);
            border-radius: 15px;
            max-width: 400px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 80%;
            margin: 10px 0;
            text-align: center;
        }

        /* --- Estilos Originais Preservados --- */
        #sidebar {
            width: 240px;
            background: rgba(0,0,0,0.9);
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        #scoreboard { padding: 15px; border-bottom: 1px solid #333; }
        #chat-box { flex-grow: 1; padding: 10px; font-size: 13px; overflow-y: auto; background: #000; color: #aaa; }

        #main-game { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        #status-bar { width: 100%; background: rgba(0,0,0,0.8); padding: 15px; text-align: center; font-size: 18px; color: var(--gold); font-weight: bold; min-height: 25px; }

        #game-board {
            position: relative;
            width: 90%;
            max-width: 900px;
            height: 65vh;
            margin: 20px;
            border: 12px solid #3d2b1f;
            border-radius: 180px;
            background: var(--bg-gradient);
            box-shadow: inset 0 0 100px #000;
        }

        .player-slot { 
            position: absolute; 
            width: 180px; 
            text-align: center; 
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
        }

        .active-turn { 
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.1) translateX(-50%) !important;
            z-index: 10;
        }
        /* Ajuste fino para slots transformados */
        #p1.active-turn { transform: scale(1.1) translateX(-50%) !important; }
        #p3.active-turn { transform: scale(1.1) translateX(-50%) !important; }
        #p2.active-turn { transform: scale(1.1) translateY(-50%) !important; }
        #p4.active-turn { transform: scale(1.1) translateY(-50%) !important; }

        #p1 { bottom: 10px; left: 50%; transform: translateX(-50%); }
        #p2 { right: 10px; top: 50%; transform: translateY(-50%); }
        #p3 { top: 10px; left: 50%; transform: translateX(-50%); }
        #p4 { left: 10px; top: 50%; transform: translateY(-50%); }

        .info-box { font-size: 12px; margin-bottom: 5px; }
        .bet-done { color: #00ff00; font-weight: bold; margin-left: 5px; }

        .hand { display: flex; justify-content: center; height: 90px; perspective: 1000px; }
        .card {
            width: 60px;
            height: 85px;
            background: white;
            border-radius: 6px;
            color: #222;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            border: 1px solid #999;
        }

        .hand .card:not(:first-child) { margin-left: -35px; }
        .hand .card:hover { transform: translateY(-15px); z-index: 100 !important; }

        .card.red { color: #cc0000; }
        .card.hidden-back { background: var(--card-back); border: 2px solid white; }
        .card .rank { position: absolute; top: 2px; left: 5px; font-size: 16px; font-weight: bold; }
        .card .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; }
        .card .suit-mini { position: absolute; bottom: 2px; right: 5px; font-size: 14px; }

        #table-area {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .played-card {
            position: absolute;
            animation: throwCard 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes throwCard {
            0% { transform: scale(0.2) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--rot)); opacity: 1; }
        }

        #controls { padding: 10px; z-index: 100; }
        button { padding: 12px 25px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; box-shadow: 0 4px #b89b00; margin: 5px; }
        button:disabled { background: #555; box-shadow: 0 4px #333; cursor: not-allowed; }
        .bet-btn { margin: 3px; font-size: 16px; }
    </style>
</head>
<body>

<div id="multiplayer-overlay">
    <div class="conn-box">
        <h2 style="color:var(--gold)">FDP ONLINE</h2>
        <div id="setup-view">
            <p>Seu ID: <b id="my-id">...</b></p>
            <input type="text" id="peer-id-input" placeholder="Cole o ID do seu amigo">
            <br>
            <button onclick="connectToPeer()">Conectar ao Amigo</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0">
            <button onclick="startSolo()" style="background:#555">Jogar com Bots (Solo)</button>
            <p id="conn-status" style="font-size:12px; color:#aaa"></p>
        </div>
        <div id="lobby-view" style="display:none">
            <h3>Jogadores na Sala:</h3>
            <ul id="player-list" style="list-style:none; padding:0"></ul>
            <button id="host-start-btn" onclick="startGame()" style="display:none">Começar Partida</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div id="scoreboard">
        <h3 style="margin:0; color:var(--gold)">🏆 Placar</h3>
        <div id="score-list" style="margin-top:10px"></div>
    </div>
    <div id="chat-box"></div>
</div>

<div id="main-game">
    <div id="status-bar">Aguardando início...</div>
    <div id="game-board">
        <div id="p1" class="player-slot"><div class="info-box" id="i1"></div><div class="hand" id="h1"></div></div>
        <div id="p2" class="player-slot"><div class="info-box" id="i2"></div><div class="hand" id="h2"></div></div>
        <div id="p3" class="player-slot"><div class="info-box" id="i3"></div><div class="hand" id="h3"></div></div>
        <div id="p4" class="player-slot"><div class="info-box" id="i4"></div><div class="hand" id="h4"></div></div>
        <div id="table-area"></div>
    </div>
    <div id="controls">
        <div id="bet-zone"></div>
    </div>
</div>

<script>
    // --- REDE E ESTADO ---
    let peer, conn;
    let isHost = false;
    let myPlayerIndex = 0;
    let connections = []; // Apenas para o Host

    const au = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, d) {
        const o = au.createOscillator(); const g = au.createGain();
        o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, au.currentTime + d);
        o.connect(g); g.connect(au.destination); o.start(); o.stop(au.currentTime + d);
    }

    const suits = ['♣', '♥', '♠', '♦'];
    const values = ['4', '5', '6', '7', 'Q', 'J', 'K', 'A', '2', '3'];
    const power = {'4♣':100,'7♥':99,'A♠':98,'7♦':97,'3':10,'2':9,'A':8,'K':7,'J':6,'Q':5,'7':4,'6':3,'5':2,'4':1};

    let players = [
        { id: 0, name: "Você", lives: 3, hand: [], bid: 0, won: 0, bot: false, hasBetted: false, remote: false },
        { id: 1, name: "Bot 1", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false },
        { id: 2, name: "Bot 2", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false },
        { id: 3, name: "Bot 3", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false, remote: false }
    ];

    let currentCards = 1;
    let turnStarter = 0;
    let roundStarter = 0;
    let tableCards = [];

    // --- LOGICA DE CONEXÃO ---
    function initPeer() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', c => {
            isHost = true;
            setupConn(c);
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('host-start-btn').style.display = 'inline-block';
        });
    }

    function connectToPeer() {
        const remoteId = document.getElementById('peer-id-input').value;
        if(!remoteId) return alert("Insira um ID!");
        conn = peer.connect(remoteId);
        setupConn(conn);
        document.getElementById('conn-status').innerText = "Conectando...";
    }

    function setupConn(c) {
        c.on('open', () => {
            if(!isHost) {
                conn = c;
                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('lobby-view').style.display = 'block';
                document.getElementById('conn-status').innerText = "Conectado ao Host!";
            } else {
                connections.push(c);
                // Transforma um bot em jogador remoto
                let nextSlot = players.find(p => p.bot);
                if(nextSlot) {
                    nextSlot.bot = false;
                    nextSlot.remote = true;
                    nextSlot.name = "Amigo " + nextSlot.id;
                    nextSlot.connId = c.peer;
                }
                updateLobbyList();
                broadcast({ type: 'LOBBY_UPDATE', players: players });
            }
        });

        c.on('data', data => handleNetworkData(data));
    }

    function updateLobbyList() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `<li>${p.name} ${p.bot ? '(Bot)' : p.id === 0 && isHost ? '(Host)' : '(Player)'}</li>`).join('');
    }

    function startSolo() {
        document.getElementById('multiplayer-overlay').style.display = 'none';
        startGame();
    }

    initPeer();

    // --- GERENCIAMENTO DE MENSAGENS ---
    function broadcast(data) {
        connections.forEach(c => c.send(data));
    }

    function sendTo(playerIdx, data) {
        const p = players[playerIdx];
        const target = connections.find(c => c.peer === p.connId);
        if(target) target.send(data);
    }

    function handleNetworkData(data) {
        if(data.type === 'LOBBY_UPDATE') {
            players = data.players;
            myPlayerIndex = players.findIndex(p => p.connId === peer.id);
            updateLobbyList();
        }
        if(data.type === 'START_GAME') {
            document.getElementById('multiplayer-overlay').style.display = 'none';
        }
        if(data.type === 'SYNC_STATE') {
            players = data.players;
            tableCards = data.tableCards;
            currentCards = data.currentCards;
            updateStatus(data.status);
            render();
            renderTable();
            if(data.activeId !== undefined) highlightPlayer(data.activeId);
        }
        if(data.type === 'ASK_BID') {
            askBid(data.forbidden).then(val => {
                conn.send({ type: 'RES_BID', value: val, from: myPlayerIndex });
            });
        }
        if(data.type === 'ASK_CARD') {
            waitCard().then(card => {
                conn.send({ type: 'RES_CARD', value: card, from: myPlayerIndex });
            });
        }
        // Respostas recebidas pelo Host
        if(isHost) {
            if(data.type === 'RES_BID') window.resolverBid(data.value);
            if(data.type === 'RES_CARD') window.resolverCard(data.value);
        }
    }

    // --- GAME LOGIC (REFATORADA PARA REDE) ---

    function updateStatus(m) { 
        document.getElementById('status-bar').innerText = m; 
    }

    function highlightPlayer(id) {
        document.querySelectorAll('.player-slot').forEach(s => s.classList.remove('active-turn'));
        if(id !== null) {
            // Ajuste visual para o jogador local sempre na base
            const visualId = isHost ? id : (id === myPlayerIndex ? 0 : id); // Simplificação
            document.getElementById(`p${id+1}`).classList.add('active-turn');
        }
    }

    async function startGame() {
        if(isHost) broadcast({ type: 'START_GAME' });
        document.getElementById('multiplayer-overlay').style.display = 'none';
        if(!isHost && conn) return; // Clientes esperam o Host

        roundStarter = Math.floor(Math.random() * 4);
        gameLoop();
    }

    async function gameLoop() {
        if (currentCards > 10) return updateStatus("FIM DO JOGO!");
        
        players.forEach(p => { p.hand = []; p.bid = 0; p.won = 0; p.hasBetted = false; });
        tableCards = [];
        
        let deck = [];
        for(let s of suits) for(let v of values) deck.push({s, v, id: v+s});
        deck.sort(() => Math.random() - 0.5);

        for(let i=0; i<currentCards; i++) {
            players.forEach(p => { if(p.lives > 0) p.hand.push(deck.pop()); });
        }

        turnStarter = roundStarter;
        sync();
        await handleBids();
        await handleTricks();
        
        roundStarter = (roundStarter + 1) % 4;
        currentCards++;
        gameLoop();
    }

    function sync(msg = "", active = null) {
        if(!isHost) return;
        render();
        renderTable();
        broadcast({
            type: 'SYNC_STATE',
            players: players,
            tableCards: tableCards,
            currentCards: currentCards,
            status: msg,
            activeId: active
        });
    }

    async function handleBids() {
        let bidder = roundStarter;
        let sum = 0;
        let active = players.filter(p => p.lives > 0).length;

        for (let i=0; i < active; i++) {
            let p = players[bidder];
            let forbidden = (i === active - 1) ? (currentCards - sum) : -1;
            
            highlightPlayer(bidder);

            if (p.bot) {
                updateStatus(`${p.name} pensando...`);
                await new Promise(r => setTimeout(r, 600));
                let strength = p.hand.filter(c => (power[c.id] || power[c.v]) > 7).length;
                p.bid = Math.min(currentCards, strength);
                if (p.bid === forbidden) p.bid = p.bid === 0 ? 1 : p.bid - 1;
            } else if (p.remote) {
                updateStatus(`Aguardando aposta de ${p.name}...`);
                sendTo(bidder, { type: 'ASK_BID', forbidden });
                p.bid = await new Promise(res => { window.resolverBid = res; });
            } else {
                updateStatus("Sua vez! Quantas você leva?");
                p.bid = await askBid(forbidden);
            }
            p.hasBetted = true;
            sum += p.bid;
            sfx(400, 'sine', 0.1);
            sync(`${p.name} apostou ${p.bid}`);
            bidder = (bidder + 1) % 4;
        }
    }

    function askBid(f) {
        return new Promise(res => {
            const zone = document.getElementById('bet-zone');
            zone.innerHTML = '';
            for(let i=0; i<=currentCards; i++) {
                if(i===f) continue;
                let b = document.createElement('button');
                b.className = 'bet-btn';
                b.innerText = i;
                b.onclick = () => { zone.innerHTML=''; res(i); };
                zone.appendChild(b);
            }
        });
    }

    async function handleTricks() {
        for(let t=0; t<currentCards; t++) {
            tableCards = [];
            let pIdx = turnStarter;
            
            for(let i=0; i<4; i++) {
                let p = players[pIdx];
                if(p.lives > 0) {
                    highlightPlayer(pIdx);
                    let card;
                    if(p.bot) {
                        updateStatus(`${p.name} jogando...`);
                        await new Promise(r => setTimeout(r, 800));
                        p.hand.sort((a,b) => (power[a.id]||power[a.v]) - (power[b.id]||power[b.v]));
                        card = p.won < p.bid ? p.hand.pop() : p.hand.shift();
                    } else if (p.remote) {
                        updateStatus(`Aguardando carta de ${p.name}...`);
                        sendTo(pIdx, { type: 'ASK_CARD' });
                        card = await new Promise(res => { window.resolverCard = res; });
                    } else {
                        updateStatus("Sua vez! Escolha uma carta.");
                        card = await waitCard();
                    }
                    
                    tableCards.push({card, owner: pIdx, rot: (Math.random()*20 - 10)});
                    sfx(600, 'sine', 0.1);
                    sync(`${p.name} jogou ${card.v}${card.s}`, pIdx);
                }
                pIdx = (pIdx + 1) % 4;
            }

            let winIdx = calcWinner(tableCards);
            players[winIdx].won++;
            turnStarter = winIdx;
            
            sync(`${players[winIdx].name} venceu a vaza!`);
            sfx(800, 'triangle', 0.2);
            await new Promise(r => setTimeout(r, 1500));
            tableCards = []; 
            sync();
        }
        await endRound();
    }

    function waitCard() {
        return new Promise(res => {
            const cards = document.querySelectorAll(`#h${myPlayerIndex+1} .card`);
            cards.forEach((c, i) => {
                c.onclick = () => {
                    let card = players[myPlayerIndex].hand.splice(i,1)[0];
                    res(card);
                };
            });
        });
    }

    function calcWinner(list) {
        let sc = list.map(x => ({...x, pwr: power[x.card.id] || power[x.card.v]}));
        let counts = {}; sc.forEach(s => counts[s.pwr] = (counts[s.pwr] || 0) + 1);
        let valid = sc.filter(s => counts[s.pwr] === 1);
        if (valid.length === 0) {
            let max = Math.max(...sc.map(s => s.pwr));
            let ties = sc.filter(s => s.pwr === max);
            const suitsP = {'♣':4,'♥':3,'♠':2,'♦':1};
            return ties.sort((a,b) => suitsP[b.card.s] - suitsP[a.card.s])[0].owner;
        }
        return valid.sort((a,b) => b.pwr - a.pwr)[0].owner;
    }

    async function endRound() {
        players.forEach(p => {
            if(p.lives > 0 && p.bid !== p.won) p.lives--;
        });
        sync("Fim da rodada! Computando vidas...");
        await new Promise(r => setTimeout(r, 2000));
    }

    function render() {
        players.forEach((p, i) => {
            const info = document.getElementById(`i${i+1}`);
            info.innerHTML = `<b>${p.name}</b> ${p.hasBetted ? '<span class="bet-done">✅</span>' : ''}<br>
                             <span style="color:#ff5555">❤️ ${p.lives}</span> | A: ${p.bid} | F: ${p.won}`;
            
            const h = document.getElementById(`h${i+1}`);
            h.innerHTML = '';
            if (p.lives <= 0) { info.innerHTML = "ELIMINADO"; return; }

            p.hand.forEach((c, idx) => {
                const el = document.createElement('div');
                const isRed = (c.s === '♥' || c.s === '♦');
                // Esconder cartas dos outros, a menos que seja a rodada de 1 carta (vira pra fora)
                let isMe = (i === myPlayerIndex);
                let hide = (currentCards === 1) ? !isMe : !isMe; 
                // No FDP real, quando é 1 carta, vc vê a dos outros e não a sua.
                if(currentCards === 1) hide = isMe; 

                el.className = `card ${isRed ? 'red' : ''} ${hide ? 'hidden-back' : ''}`;
                if(!hide) el.innerHTML = `<div class="rank">${c.v}</div><div class="center">${c.s}</div><div class="suit-mini">${c.s}</div>`;
                h.appendChild(el);
            });
        });

        const sl = document.getElementById('score-list');
        let sorted = [...players].sort((a,b) => b.lives - a.lives);
        sl.innerHTML = sorted.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.name}</span> <b>${p.lives}❤️</b></div>`).join('');
    }

    function renderTable() {
        const area = document.getElementById('table-area');
        area.innerHTML = '';
        tableCards.forEach(item => {
            const el = document.createElement('div');
            const isRed = (item.card.s === '♥' || item.card.s === '♦');
            el.className = `card played-card ${isRed ? 'red' : ''}`;
            el.style.setProperty('--rot', `${item.rot}deg`);
            el.innerHTML = `<div class="rank">${item.card.v}</div><div class="center">${item.card.s}</div><div class="suit-mini">${item.card.s}</div>`;
            area.appendChild(el);
        });
    }
</script>
</body>
</html>
